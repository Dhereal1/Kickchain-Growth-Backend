<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Kickchain</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        /* KickChain theme (football pitch + Web3 neon) */
        --pitch: #0B3D2E;
        --bg: #000000;
        --panel: rgba(0, 0, 0, 0.40);
        --panel2: rgba(0, 0, 0, 0.26);
        --text: rgba(255, 255, 255, 0.93);
        --muted: rgba(255, 255, 255, 0.68);
        --border: rgba(255, 255, 255, 0.10);
        --primary: #00FF88;
        --primary2: rgba(0, 255, 136, 0.60);
        --danger: #ff3b5c;
        --shadow: 0 14px 40px rgba(0, 0, 0, 0.55);
        --shadow2: 0 10px 26px rgba(0, 0, 0, 0.45);
        --glow: 0 0 0 1px rgba(0, 255, 136, 0.16), 0 0 24px rgba(0, 255, 136, 0.15);
        --glow-strong: 0 0 0 1px rgba(0, 255, 136, 0.26), 0 0 34px rgba(0, 255, 136, 0.24);

        /* Telegram theme vars (fallbacks). Keep app readable inside Telegram. */
        --tg-bg: var(--tg-theme-bg-color, var(--bg));
        --tg-text: var(--tg-theme-text-color, rgba(255, 255, 255, 0.93));
        --tg-hint: var(--tg-theme-hint-color, rgba(255, 255, 255, 0.68));
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background:
          radial-gradient(1000px 520px at 50% -20%, rgba(0, 255, 136, 0.10), transparent 60%),
          radial-gradient(900px 520px at 0% 20%, rgba(0, 255, 136, 0.08), transparent 60%),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.03) 0px,
            rgba(255, 255, 255, 0.03) 1px,
            transparent 1px,
            transparent 42px
          ),
          linear-gradient(180deg, var(--pitch) 0%, var(--bg) 100%);
        color: var(--tg-text);
        color-scheme: dark;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(720px 360px at 18% 0%, rgba(255, 255, 255, 0.06), transparent 60%),
          radial-gradient(720px 360px at 82% 0%, rgba(255, 255, 255, 0.05), transparent 60%),
          radial-gradient(500px 300px at 50% 100%, rgba(0, 255, 136, 0.07), transparent 60%);
        opacity: 0.9;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 16px 14px 90px;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 2px 0 10px;
      }
      .brand { display: grid; gap: 2px; }
      .brand .title {
        font-weight: 900;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.78));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 24px rgba(0, 255, 136, 0.10);
      }
      .brand .sub {
        font-size: 12px;
        color: var(--tg-hint);
        letter-spacing: 0.3px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.24);
        border-radius: 999px;
        font-size: 12px;
        color: var(--tg-hint);
        user-select: none;
        white-space: nowrap;
        backdrop-filter: blur(10px);
      }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 0 4px rgba(255, 59, 92, 0.14), 0 0 16px rgba(255, 59, 92, 0.22); }
      .dot.ok { background: var(--primary); box-shadow: 0 0 0 4px rgba(0, 255, 136, 0.14), 0 0 16px rgba(0, 255, 136, 0.20); }
      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 10px 0 12px;
      }
      .tab {
        appearance: none;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.26);
        color: var(--tg-text);
        padding: 9px 11px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease, background 140ms ease;
        backdrop-filter: blur(10px);
      }
      .tab[data-tab="leaderboard"]::before { content: "🏟️ "; }
      .tab[data-tab="progress"]::before { content: "⚡ "; }
      .tab[data-tab="me"]::before { content: "🪙 "; }
      .tab[data-tab="referrals"]::before { content: "🤝 "; }
      .tab:hover { transform: translateY(-1px); box-shadow: var(--shadow2); border-color: rgba(0, 255, 136, 0.18); }
      .tab:active { transform: translateY(0px) scale(0.99); }
      .tab.active { border-color: rgba(0, 255, 136, 0.45); background: rgba(0, 255, 136, 0.10); box-shadow: var(--glow); }
      .card {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.46), rgba(0, 0, 0, 0.22));
        overflow: hidden;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }
      .card .hd {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: rgba(0, 0, 0, 0.22);
      }
      .card .hd h2 {
        margin: 0;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.9px;
        text-transform: uppercase;
      }
      .card .bd { padding: 12px 14px 14px; }
      .row { display: grid; gap: 10px; }
      .kvs { display: grid; gap: 10px; }
      .kv {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.22);
        display: grid;
        gap: 6px;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
      }
      .kv .k { font-size: 12px; color: var(--tg-hint); letter-spacing: 0.4px; text-transform: uppercase; }
      .kv .v { font-size: 14px; font-weight: 900; letter-spacing: 0.2px; }
      .list { display: grid; gap: 10px; }
      .item {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.22);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
        transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      }
      .item:hover { transform: translateY(-1px); border-color: rgba(0, 255, 136, 0.16); box-shadow: var(--shadow2); }
      .item:active { transform: translateY(0px); }
      .item .t { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
      .item .t .name { font-weight: 900; font-size: 13px; letter-spacing: 0.4px; }
      .item .t .pill2 {
        font-size: 11px;
        color: var(--tg-hint);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 8px;
        background: rgba(0, 0, 0, 0.18);
      }
      .item .m { margin-top: 6px; color: var(--tg-hint); font-size: 12px; line-height: 1.45; }
      .btns { display: flex; gap: 8px; flex-wrap: wrap; }
      .btn {
        appearance: none;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.28);
        color: var(--tg-text);
        padding: 9px 10px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease, background 140ms ease, filter 140ms ease;
        backdrop-filter: blur(10px);
      }
      .btn:hover { transform: translateY(-1px); border-color: rgba(0, 255, 136, 0.24); box-shadow: var(--shadow2); }
      .btn:active { transform: translateY(0px) scale(0.98); filter: brightness(1.05); }
      .btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; box-shadow: none; }
      .btn.primary {
        background:
          linear-gradient(180deg, rgba(0, 255, 136, 0.22), rgba(0, 255, 136, 0.10)),
          rgba(0, 0, 0, 0.32);
        border-color: rgba(0, 255, 136, 0.55);
        box-shadow: var(--glow-strong);
      }
      .btn.primary:hover { box-shadow: var(--glow-strong), var(--shadow2); }
      .hint { font-size: 12px; color: var(--tg-hint); line-height: 1.45; }
      .error {
        border: 1px solid rgba(251, 113, 133, 0.28);
        background: rgba(251, 113, 133, 0.10);
        color: rgba(255, 255, 255, 0.9);
        padding: 10px 12px;
        border-radius: 14px;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .skeleton {
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(255,255,255,0.06), rgba(0,255,136,0.14), rgba(255,255,255,0.06));
        background-size: 200% 100%;
        animation: shimmer 1.2s infinite;
      }
      @keyframes shimmer {
        0% { background-position: 180% 0; }
        100% { background-position: -20% 0; }
      }
      .footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.56);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.10);
      }
      .footer .inner {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .footer .small { font-size: 12px; color: var(--tg-hint); letter-spacing: 0.25px; }

      @media (prefers-reduced-motion: reduce) {
        .tab, .btn, .item { transition: none; }
        .skeleton { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="brand">
          <div class="title">Kickchain</div>
          <div class="sub">Leaderboard • Stats • Referrals</div>
        </div>
        <div class="pill" id="connPill">
          <span class="dot" id="connDot"></span>
          <span id="connText">Connecting…</span>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="leaderboard">Leaderboard</button>
        <button class="tab" data-tab="progress">Progress</button>
        <button class="tab" data-tab="me">My Stats</button>
        <button class="tab" data-tab="referrals">Referrals</button>
      </div>

      <div class="row" id="panel">
        <div class="card">
          <div class="hd"><h2>Loading…</h2></div>
          <div class="bd">
            <div class="row">
              <div class="skeleton" style="width: 60%"></div>
              <div class="skeleton" style="width: 85%"></div>
              <div class="skeleton" style="width: 40%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="inner">
        <div class="small" id="footerText">—</div>
        <div class="btns">
          <button class="btn" id="btnRefresh">Refresh</button>
          <button class="btn primary" id="btnClose">Close</button>
        </div>
      </div>
    </div>

    <script src="/miniapp/app.js"></script>
  </body>
</html>
